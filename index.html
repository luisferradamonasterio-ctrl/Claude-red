<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscador de Licitaciones — Mercado Público Chile</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --primary: #1a56db;
      --primary-dark: #1340b0;
      --text: #1e293b;
      --muted: #64748b;
      --badge-publicada-bg: #dcfce7;
      --badge-publicada-fg: #15803d;
      --badge-cerrada-bg: #fee2e2;
      --badge-cerrada-fg: #b91c1c;
      --badge-adjudicada-bg: #fef9c3;
      --badge-adjudicada-fg: #854d0e;
      --badge-default-bg: #f1f5f9;
      --badge-default-fg: #475569;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--primary);
      color: #fff;
      padding: 32px 24px 28px;
      text-align: center;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -.3px; }
    header p  { margin-top: 6px; opacity: .85; font-size: .95rem; }

    .search-wrapper {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .search-row {
      display: flex;
      gap: 10px;
      max-width: 860px;
      margin: 0 auto;
    }
    .search-row input {
      flex: 1;
      padding: 11px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .search-row input:focus { border-color: var(--primary); }
    .search-row button {
      padding: 11px 22px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }
    .search-row button:hover  { background: var(--primary-dark); }
    .search-row button:active { transform: scale(.98); }

    .filters {
      max-width: 860px;
      margin: 0 auto;
      padding: 14px 0 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filters span { font-size: .85rem; color: var(--muted); }
    .filter-btn {
      padding: 5px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      font-size: .85rem;
      cursor: pointer;
      transition: all .15s;
    }
    .filter-btn:hover               { border-color: var(--primary); color: var(--primary); }
    .filter-btn.active              { background: var(--primary); color: #fff; border-color: var(--primary); }

    main {
      max-width: 860px;
      margin: 24px auto;
      padding: 0 24px 48px;
    }

    .status-bar {
      font-size: .88rem;
      color: var(--muted);
      margin-bottom: 16px;
      min-height: 20px;
    }

    .cards { display: flex; flex-direction: column; gap: 14px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow);
      transition: box-shadow .2s, transform .15s;
    }
    .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.1); transform: translateY(-1px); }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .card-title  { font-size: 1rem; font-weight: 600; line-height: 1.4; flex: 1; }

    .badge {
      flex-shrink: 0;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .badge-publicada   { background: var(--badge-publicada-bg);   color: var(--badge-publicada-fg); }
    .badge-cerrada     { background: var(--badge-cerrada-bg);     color: var(--badge-cerrada-fg); }
    .badge-adjudicada  { background: var(--badge-adjudicada-bg);  color: var(--badge-adjudicada-fg); }
    .badge-default     { background: var(--badge-default-bg);     color: var(--badge-default-fg); }

    .card-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 10px;
      font-size: .87rem;
      color: var(--muted);
    }
    .card-meta span::before { content: attr(data-icon) " "; }

    .card-footer {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .card-link {
      font-size: .88rem;
      font-weight: 600;
      color: var(--primary);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .card-link:hover { text-decoration: underline; }
    .card-link svg { width: 14px; height: 14px; }

    /* ── Botón Ver Detalle ── */
    .btn-detalle {
      padding: 7px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background .2s;
    }
    .btn-detalle:hover { background: var(--primary-dark); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.55);
      z-index: 100;
      padding: 20px;
      overflow-y: auto;
      backdrop-filter: blur(2px);
    }
    .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

    .modal {
      background: var(--surface);
      border-radius: 14px;
      width: 100%;
      max-width: 720px;
      margin: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      animation: modalIn .22s ease;
      overflow: hidden;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(14px) scale(.98); }
      to   { opacity: 1; transform: none; }
    }

    .modal-header {
      background: var(--primary);
      color: #fff;
      padding: 20px 24px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .modal-header-text { flex: 1; }
    .modal-header h2 { font-size: 1.05rem; font-weight: 700; line-height: 1.4; }
    .modal-header .modal-codigo { font-size: .82rem; opacity: .8; margin-top: 4px; }
    .modal-close {
      background: rgba(255,255,255,.18);
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s;
    }
    .modal-close:hover { background: rgba(255,255,255,.3); }

    .modal-body { padding: 24px; }

    .modal-spinner {
      text-align: center;
      padding: 40px 0;
      color: var(--muted);
    }
    .modal-spinner .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 14px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }
    @media (max-width: 540px) { .detail-grid { grid-template-columns: 1fr; } }

    .detail-field { padding: 12px 14px; background: var(--bg); border-radius: 8px; }
    .detail-field.full { grid-column: 1 / -1; }
    .detail-label { font-size: .75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .detail-value { font-size: .92rem; color: var(--text); line-height: 1.5; word-break: break-word; }
    .detail-value.empty { color: var(--muted); font-style: italic; }

    .items-table-wrap { overflow-x: auto; margin-top: 4px; }
    .items-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
    }
    .items-table th {
      background: var(--primary);
      color: #fff;
      text-align: left;
      padding: 9px 12px;
      font-weight: 600;
      font-size: .8rem;
    }
    .items-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .items-table tr:last-child td { border-bottom: none; }
    .items-table tr:nth-child(even) td { background: var(--bg); }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .modal-footer a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius);
      text-decoration: none;
      font-size: .9rem;
      font-weight: 600;
      transition: background .2s;
    }
    .modal-footer a:hover { background: var(--primary-dark); }
    .modal-footer .btn-cerrar {
      padding: 9px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      font-size: .9rem;
      cursor: pointer;
      transition: background .15s;
    }
    .modal-footer .btn-cerrar:hover { background: var(--bg); }

    .state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: .95rem;
    }
    .state svg { display: block; margin: 0 auto 16px; opacity: .35; }
    .state .state-title { font-size: 1.05rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      header h1 { font-size: 1.3rem; }
      .card-meta { gap: 10px; }
      .card-header { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <h1>🔍 Buscador de Licitaciones</h1>
  <p>Busca oportunidades en Mercado Público de Chile</p>
</header>

<div class="search-wrapper">
  <div class="search-row">
    <input
      id="searchInput"
      type="text"
      placeholder="Ej: software, ciberseguridad, inteligencia artificial…"
      autocomplete="off"
    />
    <button id="searchBtn" onclick="buscar()">Buscar</button>
  </div>
  <div class="filters">
    <span>Filtrar:</span>
    <button class="filter-btn active" data-estado="todos" onclick="setFiltro(this)">Todos</button>
    <button class="filter-btn" data-estado="Publicada" onclick="setFiltro(this)">Publicadas</button>
    <button class="filter-btn" data-estado="Cerrada" onclick="setFiltro(this)">Cerradas</button>
    <button class="filter-btn" data-estado="Adjudicada" onclick="setFiltro(this)">Adjudicadas</button>
    <button class="filter-btn" data-estado="Desierta" onclick="setFiltro(this)">Desiertas</button>
  </div>
</div>

<main>
  <div class="status-bar" id="statusBar"></div>
  <div class="cards" id="cardsContainer">
    <div class="state">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.4">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <div class="state-title">Ingresa una búsqueda</div>
      Escribe palabras clave para encontrar licitaciones en Mercado Público.
    </div>
  </div>
</main>

<!-- ══════════════ MODAL DETALLE ══════════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="cerrarModalOverlay(event)">
  <div class="modal" id="modalBox">
    <div class="modal-header" id="modalHeader">
      <div class="modal-header-text">
        <h2 id="modalTitulo">Cargando…</h2>
        <div class="modal-codigo" id="modalCodigo"></div>
      </div>
      <button class="modal-close" onclick="cerrarModal()" title="Cerrar">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="modal-spinner"><div class="spinner"></div>Consultando detalle…</div>
    </div>
    <div class="modal-footer" id="modalFooter" style="display:none">
      <button class="btn-cerrar" onclick="cerrarModal()">Cerrar</button>
      <a id="modalLinkPortal" href="#" target="_blank" rel="noopener">
        Ver en Mercado Público
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>
    </div>
  </div>
</div>

<script>
  const TICKET = '9AD92373-2AF1-4F72-B9D4-CA8E087E27F2';
  const API    = 'https://api.mercadopublico.cl/servicios/v1/publico/licitaciones.json';

  let todasLicitaciones = [];
  let filtroActivo      = 'todos';

  const ESTADOS = {
    '5':  'Publicada',  'publicada':  'Publicada',
    '6':  'Cerrada',    'cerrada':    'Cerrada',
    '7':  'Desierta',   'desierta':   'Desierta',
    '8':  'Adjudicada', 'adjudicada': 'Adjudicada',
    '9':  'Revocada',   'revocada':   'Revocada',
    '10': 'Suspendida', 'suspendida': 'Suspendida',
    '13': 'Publicada',
    '18': 'Revocada',
  };

  function estadoLabel(val) {
    if (!val && val !== 0) return 'Desconocido';
    const key = String(val).toLowerCase().trim();
    return ESTADOS[key] || (val.toString().charAt(0).toUpperCase() + val.toString().slice(1));
  }

  function badgeClass(label) {
    const l = label.toLowerCase();
    if (l === 'publicada') return 'badge-publicada';
    if (l === 'cerrada')   return 'badge-cerrada';
    if (l.startsWith('adj')) return 'badge-adjudicada';
    return 'badge-default';
  }

  function formatFecha(raw) {
    if (!raw) return '—';
    const ms = raw.match(/\/Date\((\d+)/);
    const d   = ms ? new Date(+ms[1]) : new Date(raw);
    if (isNaN(d)) return raw;
    return d.toLocaleDateString('es-CL', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function urlLicitacion(codigo) {
    if (!codigo) return 'https://www.mercadopublico.cl';
    return `https://www.mercadopublico.cl/Procurement/Modules/RFB/DetailsAcquisition.aspx?qs=${encodeURIComponent(codigo)}`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ══════════════ MODAL ══════════════

  function abrirModal(codigo, nombre) {
    document.getElementById('modalTitulo').textContent = nombre;
    document.getElementById('modalCodigo').textContent = codigo;
    document.getElementById('modalBody').innerHTML = '<div class="modal-spinner"><div class="spinner"></div>Consultando detalle…</div>';
    document.getElementById('modalFooter').style.display = 'none';
    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    cargarDetalle(codigo);
  }

  function cerrarModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
  }

  function cerrarModalOverlay(e) {
    if (e.target === document.getElementById('modalOverlay')) cerrarModal();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });

  async function cargarDetalle(codigo) {
    const url = `${API}?ticket=${TICKET}&codigo=${encodeURIComponent(codigo)}`;
    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      const lic  = (data.Listado || data.listado || [])[0];
      if (!lic) throw new Error('No se encontró el detalle de esta licitación.');
      renderDetalle(lic);
    } catch (err) {
      document.getElementById('modalBody').innerHTML = `
        <div class="state" style="padding:30px 0">
          <div class="state-title">Error al cargar detalle</div>
          ${escHtml(err.message)}
        </div>`;
    }
  }

  function campo(label, valor, full = false) {
    const v = valor && String(valor).trim() ? escHtml(valor) : '<span class="empty">—</span>';
    return `<div class="detail-field${full ? ' full' : ''}">
      <div class="detail-label">${label}</div>
      <div class="detail-value">${v}</div>
    </div>`;
  }

  function renderDetalle(lic) {
    const nombre    = lic.Nombre || '—';
    const codigo    = lic.CodigoExterno || lic.Codigo || '';
    const organismo = lic.Organismo?.Nombre || lic.NombreOrganismo || '—';
    const estado    = estadoLabel(lic.Estado ?? '');
    const desc      = lic.Descripcion || lic.descripcion || '';
    const monto     = lic.MontoEstimado
                        ? `$${Number(lic.MontoEstimado).toLocaleString('es-CL')} ${lic.Moneda || 'CLP'}`
                        : '—';
    const tipo      = lic.Tipo || lic.TipoConvocatoria || '—';
    const cierre    = formatFecha(lic.Fechas?.FechaCierre || lic.FechaCierre);
    const publicada = formatFecha(lic.Fechas?.FechaPublicacion || lic.FechaPublicacion);
    const apertura  = formatFecha(lic.Fechas?.FechaApertura || lic.FechaApertura);
    const contacto  = [lic.Responsable?.Nombre, lic.Responsable?.Email, lic.Responsable?.Telefono]
                        .filter(Boolean).join(' · ') || '—';

    // Ítems
    const itemsLista = lic.Items?.Listado || lic.Items?.listado || [];
    let itemsHtml = '';
    if (itemsLista.length) {
      const filas = itemsLista.map(i => `
        <tr>
          <td>${escHtml(String(i.Correlativo || i.correlativo || ''))}</td>
          <td>${escHtml(i.NombreProducto || i.Nombre || i.nombre || '—')}</td>
          <td>${escHtml(String(i.Cantidad || '—'))} ${escHtml(i.UnidadMedida || '')}</td>
          <td>${escHtml(i.Descripcion || i.descripcion || '—')}</td>
        </tr>`).join('');
      itemsHtml = `
        <div class="detail-field full">
          <div class="detail-label">Ítems requeridos (${itemsLista.length})</div>
          <div class="items-table-wrap">
            <table class="items-table">
              <thead><tr><th>#</th><th>Producto / Servicio</th><th>Cantidad</th><th>Descripción</th></tr></thead>
              <tbody>${filas}</tbody>
            </table>
          </div>
        </div>`;
    } else {
      itemsHtml = campo('Ítems', 'Sin ítems registrados', true);
    }

    document.getElementById('modalTitulo').textContent = nombre;
    document.getElementById('modalCodigo').textContent = codigo;

    document.getElementById('modalBody').innerHTML = `
      <div class="detail-grid">
        ${campo('Organismo', organismo)}
        ${campo('Estado', estado)}
        ${campo('Tipo', tipo)}
        ${campo('Monto estimado', monto)}
        ${campo('Fecha publicación', publicada)}
        ${campo('Fecha cierre', cierre)}
        ${campo('Apertura de ofertas', apertura)}
        ${campo('Contacto', contacto)}
        ${desc ? campo('Descripción', desc, true) : ''}
        ${itemsHtml}
      </div>`;

    const linkPortal = document.getElementById('modalLinkPortal');
    linkPortal.href = urlLicitacion(codigo);
    document.getElementById('modalFooter').style.display = 'flex';
  }

  // ══════════════ RENDER TARJETAS ══════════════

  function renderTarjetas(lista) {
    const container = document.getElementById('cardsContainer');
    const statusBar = document.getElementById('statusBar');

    const filtradas = filtroActivo === 'todos'
      ? lista
      : lista.filter(l => {
          const lbl = estadoLabel(l.Estado || l.estado || '');
          return lbl.toLowerCase() === filtroActivo.toLowerCase();
        });

    statusBar.textContent = filtradas.length
      ? `${filtradas.length} licitación${filtradas.length !== 1 ? 'es' : ''} encontrada${filtradas.length !== 1 ? 's' : ''}`
      : '';

    if (!filtradas.length) {
      container.innerHTML = emptyState(
        filtroActivo !== 'todos'
          ? `Sin resultados para el filtro "${filtroActivo}"`
          : 'Sin resultados',
        filtroActivo !== 'todos'
          ? 'Prueba seleccionando "Todos" o ajusta las palabras clave.'
          : 'Intenta con otros términos de búsqueda.'
      );
      return;
    }

    container.innerHTML = filtradas.map(l => {
      const nombre    = l.Nombre   || l.nombre   || 'Sin nombre';
      const organismo = (l.Organismo && (l.Organismo.Nombre || l.Organismo.nombre))
                        || l.organismo || '—';
      const codigo    = l.CodigoExterno || l.codigoExterno || l.Codigo || l.codigo || '';
      const estado    = estadoLabel(l.Estado ?? l.estado ?? '');
      const cierre    = formatFecha(l.FechaCierre || l.fechaCierre);
      const inicio    = formatFecha(l.FechaPublicacion || l.fechaPublicacion || l.FechaInicio);

      return `
        <div class="card">
          <div class="card-header">
            <div class="card-title">${escHtml(nombre)}</div>
            <span class="badge ${badgeClass(estado)}">${estado}</span>
          </div>
          <div class="card-meta">
            <span data-icon="🏛️">${escHtml(organismo)}</span>
            ${inicio !== '—' ? `<span data-icon="📅">Publicada: ${inicio}</span>` : ''}
            <span data-icon="⏰">Cierre: ${cierre}</span>
            ${codigo ? `<span data-icon="📋">${escHtml(codigo)}</span>` : ''}
          </div>
          <div class="card-footer">
            <a class="card-link" href="${urlLicitacion(codigo)}" target="_blank" rel="noopener">
              Ver en Mercado Público
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
            </a>
            ${codigo ? `<button class="btn-detalle" onclick="abrirModal('${escHtml(codigo)}', '${escHtml(nombre).replace(/'/g,"\\'")}')">
              🔎 Ver detalle
            </button>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function emptyState(title, msg) {
    return `<div class="state">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.4">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <div class="state-title">${title}</div>${msg}</div>`;
  }

  function setFiltro(btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filtroActivo = btn.dataset.estado;
    if (todasLicitaciones.length) renderTarjetas(todasLicitaciones);
  }

  async function buscar() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) {
      document.getElementById('searchInput').focus();
      return;
    }

    const container = document.getElementById('cardsContainer');
    const statusBar = document.getElementById('statusBar');
    statusBar.textContent = '';
    container.innerHTML = `<div class="state"><div class="spinner"></div>Buscando licitaciones…</div>`;

    const url = `${API}?ticket=${TICKET}&nombre=${encodeURIComponent(q)}`;

    try {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      todasLicitaciones = data.Listado || data.listado || (Array.isArray(data) ? data : []);

      if (!todasLicitaciones.length) {
        statusBar.textContent = '';
        container.innerHTML = emptyState('Sin resultados', `No se encontraron licitaciones para "<strong>${escHtml(q)}</strong>".`);
        return;
      }

      renderTarjetas(todasLicitaciones);

    } catch (err) {
      console.error(err);
      container.innerHTML = `
        <div class="state">
          <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.4">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <div class="state-title">Error al consultar la API</div>
          ${err.message.includes('Failed to fetch') || err.message.includes('NetworkError')
            ? 'El navegador bloqueó la solicitud por CORS. Ejecuta este archivo desde un servidor local o usa un proxy.'
            : escHtml(err.message)}
        </div>`;
    }
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') buscar();
  });
</script>
</body>
</html>
